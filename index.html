<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <link rel="manifest" href="manifest.json">
    <title>Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066FF;
            --primary-dark: #0052CC;
            --primary-light: #E6F0FF;
            --success: #00C853;
            --success-light: #E8F5E9;
            --warning: #FF9500;
            --warning-light: #FFF3E0;
            --danger: #FF3B30;
            --danger-light: #FFEBEE;
            --bg: #F5F7FA;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #8E8E93;
            --border: #E5E5EA;
            --shadow: rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 70px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--card);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .header-greeting {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .balance-overview {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            margin: 0;
            padding: 24px 20px;
            color: white;
        }

        .balance-main {
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 13px;
            opacity: 0.85;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .balance-amount {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .balance-item {
            background: rgba(255,255,255,0.12);
            padding: 12px 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .balance-item-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .balance-item-value {
            font-size: 20px;
            font-weight: 700;
        }

        .container {
            padding: 0 20px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 12px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .section-action {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .action-btn {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.expense {
            border-color: var(--danger);
            background: var(--danger-light);
        }

        .action-btn.income {
            border-color: var(--success);
            background: var(--success-light);
        }

        .action-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .action-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--card);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .category-btn {
            padding: 12px 8px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .category-btn.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1.5px solid var(--border);
        }

        .transaction-list {
            margin-top: 12px;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }

        .transaction-icon.expense {
            background: var(--danger-light);
        }

        .transaction-icon.income {
            background: var(--success-light);
        }

        .transaction-details {
            flex: 1;
        }

        .transaction-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .transaction-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .transaction-amount {
            font-size: 18px;
            font-weight: 700;
            text-align: right;
        }

        .transaction-amount.expense {
            color: var(--danger);
        }

        .transaction-amount.income {
            color: var(--success);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            margin-left: 4px;
        }

        .daily-breakdown {
            margin-top: 12px;
        }

        .day-item {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .day-date {
            font-size: 15px;
            font-weight: 600;
        }

        .day-total {
            font-size: 16px;
            font-weight: 700;
            color: var(--danger);
        }

        .day-transactions {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            display: none;
        }

        .day-transactions.expanded {
            display: block;
        }

        .chart-bar {
            margin-bottom: 16px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .chart-category {
            font-weight: 600;
        }

        .chart-amount {
            color: var(--text-secondary);
        }

        .chart-progress {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .chart-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
            border-radius: 4px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            box-shadow: 0 -1px 3px var(--shadow);
        }

        .nav-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-btn.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--card);
            z-index: 1;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: var(--bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .empty-text {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .warning-badge {
            background: var(--warning-light);
            color: var(--warning);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            border-left: 3px solid var(--warning);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .category-manager {
            margin-top: 16px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .add-category-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-greeting">Good Evening</div>
        <div class="header-title" id="header-title">Overview</div>
    </div>

    <div class="balance-overview">
        <div class="balance-main">
            <div class="balance-label">AVAILABLE BALANCE</div>
            <div class="balance-amount">₹<span id="available-balance">0</span></div>
        </div>
        <div class="balance-grid">
            <div class="balance-item">
                <div class="balance-item-label">Income</div>
                <div class="balance-item-value">₹<span id="total-income">0</span></div>
            </div>
            <div class="balance-item">
                <div class="balance-item-label">Expenses</div>
                <div class="balance-item-value">₹<span id="total-expenses">0</span></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Home Tab -->
        <div class="tab-content active" id="tab-home">
            <div class="quick-actions">
                <div class="action-btn expense" onclick="openModal('expense')">
                    <div class="action-icon">💸</div>
                    <div class="action-label">Add Expense</div>
                </div>
                <div class="action-btn income" onclick="openModal('income')">
                    <div class="action-icon">💰</div>
                    <div class="action-label">Add Income</div>
                </div>
            </div>

            <div id="warning-container"></div>

            <div class="section-header">
                <div class="section-title">Recent Transactions</div>
                <button class="section-action" onclick="switchTab('transactions')">View All</button>
            </div>

            <div class="card">
                <div class="transaction-list" id="recent-transactions"></div>
            </div>

            <div class="section-header">
                <div class="section-title">Daily Breakdown</div>
            </div>

            <div class="daily-breakdown" id="daily-breakdown"></div>
        </div>

        <!-- Transactions Tab -->
        <div class="tab-content" id="tab-transactions">
            <div class="section-header" style="margin-top: 16px;">
                <div class="section-title">All Transactions</div>
            </div>
            <div class="card">
                <div class="transaction-list" id="all-transactions"></div>
            </div>
        </div>

        <!-- Insights Tab -->
        <div class="tab-content" id="tab-insights">
            <div class="section-header" style="margin-top: 16px;">
                <div class="section-title">Spending by Category</div>
            </div>
            <div class="card" id="category-chart"></div>

            <div class="section-header">
                <div class="section-title">Monthly Stats</div>
            </div>
            <div class="stat-grid" id="monthly-stats"></div>
        </div>

        <!-- Settings Tab -->
        <div class="tab-content" id="tab-settings">
            <div class="section-header" style="margin-top: 16px;">
                <div class="section-title">Categories</div>
                <button class="section-action" onclick="addNewCategory()">+ Add</button>
            </div>
            <div class="card">
                <div class="category-manager" id="category-manager"></div>
            </div>

            <div class="section-header">
                <div class="section-title">Spending Limits</div>
            </div>
            <div class="card">
                <div class="input-group">
                    <label class="input-label">Monthly Limit</label>
                    <input type="number" id="monthly-limit" placeholder="0" inputmode="decimal">
                </div>
                <div class="input-group">
                    <label class="input-label">Weekly Limit</label>
                    <input type="number" id="weekly-limit" placeholder="0" inputmode="decimal">
                </div>
                <button class="btn btn-primary" onclick="saveLimits()">Save Limits</button>
            </div>

            <div class="section-header">
                <div class="section-title">Data</div>
            </div>
            <div class="card">
                <button class="btn btn-secondary" onclick="exportData()">📤 Export Data</button>
            </div>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Add Expense</div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">SMS (Optional)</label>
                    <textarea id="sms-text" placeholder="Paste SMS to auto-extract amount" rows="3"></textarea>
                    <button class="btn btn-secondary" onclick="parseSMS()" style="margin-top: 8px;">Parse SMS</button>
                </div>

                <div class="input-group">
                    <label class="input-label">Amount (₹)</label>
                    <input type="number" id="amount" placeholder="0" inputmode="decimal">
                </div>

                <div class="input-group" id="category-section">
                    <label class="input-label">Category</label>
                    <div class="category-grid" id="category-grid"></div>
                </div>

                <div class="input-group">
                    <label class="input-label">Description</label>
                    <input type="text" id="description" placeholder="e.g., Lunch, Salary, etc.">
                </div>

                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="date" id="transaction-date">
                </div>

                <button class="btn btn-primary" onclick="addTransaction()" id="submit-btn">Add Expense</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('home')">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </button>
        <button class="nav-btn" onclick="switchTab('transactions')">
            <div class="nav-icon">📊</div>
            <div>Transactions</div>
        </button>
        <button class="nav-btn" onclick="switchTab('insights')">
            <div class="nav-icon">📈</div>
            <div>Insights</div>
        </button>
        <button class="nav-btn" onclick="switchTab('settings')">
            <div class="nav-icon">⚙️</div>
            <div>Settings</div>
        </button>
    </div>

    <script>
        const DEFAULT_EXPENSE_CATEGORIES = [
            '🍔 Food & Dining',
            '🚗 Transport',
            '🛍️ Shopping',
            '💡 Bills & Utilities',
            '🎬 Entertainment',
            '🏥 Healthcare',
            '🛒 Groceries',
            '💅 Personal Care',
            '📚 Education',
            '👔 Responsibilities',
            '🏠 Rent/EMI',
            '📦 Other'
        ];

        const DEFAULT_INCOME_CATEGORIES = [
            '💼 Salary',
            '💰 Freelance',
            '🎁 Gift',
            '📈 Investment',
            '💵 Bonus',
            '🔄 Refund',
            '📦 Other'
        ];

        let data = {
            transactions: [],
            expenseCategories: DEFAULT_EXPENSE_CATEGORIES,
            incomeCategories: DEFAULT_INCOME_CATEGORIES,
            limits: {
                monthly: 0,
                weekly: 0
            }
        };

        let currentModalType = 'expense';
        let selectedCategory = '';

        // Load data
        function loadData() {
            const saved = localStorage.getItem('expenseTrackerProData');
            if (saved) {
                const loaded = JSON.parse(saved);
                // Migrate old data if exists
                if (loaded.expenses && !loaded.transactions) {
                    data.transactions = loaded.expenses.map(e => ({...e, type: 'expense'}));
                } else {
                    data = loaded;
                }
            }
            
            // Ensure categories exist
            if (!data.expenseCategories) data.expenseCategories = DEFAULT_EXPENSE_CATEGORIES;
            if (!data.incomeCategories) data.incomeCategories = DEFAULT_INCOME_CATEGORIES;
            if (!data.limits) data.limits = { monthly: 0, weekly: 0 };
            
            updateUI();
        }

        function saveData() {
            localStorage.setItem('expenseTrackerProData', JSON.stringify(data));
        }

        function updateUI() {
            updateBalances();
            renderRecentTransactions();
            renderAllTransactions();
            renderDailyBreakdown();
            renderCategoryChart();
            renderMonthlyStats();
            renderCategoryManager();
            checkLimits();
            
            if (data.limits) {
                document.getElementById('monthly-limit').value = data.limits.monthly || '';
                document.getElementById('weekly-limit').value = data.limits.weekly || '';
            }
        }

        function updateBalances() {
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expenses;

            document.getElementById('available-balance').textContent = balance.toFixed(0);
            document.getElementById('total-income').textContent = income.toFixed(0);
            document.getElementById('total-expenses').textContent = expenses.toFixed(0);
        }

        function isThisMonth(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
        }

        function openModal(type) {
            currentModalType = type;
            selectedCategory = '';
            
            document.getElementById('modal-title').textContent = type === 'expense' ? 'Add Expense' : 'Add Income';
            document.getElementById('submit-btn').textContent = type === 'expense' ? 'Add Expense' : 'Add Income';
            
            const categorySection = document.getElementById('category-section');
            categorySection.style.display = 'block';
            
            renderCategories();
            
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('sms-text').value = '';
            document.getElementById('transaction-date').value = new Date().toISOString().split('T')[0];
            
            document.getElementById('transaction-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('transaction-modal').classList.remove('show');
        }

        function renderCategories() {
            const categories = currentModalType === 'expense' ? data.expenseCategories : data.incomeCategories;
            const grid = document.getElementById('category-grid');
            grid.innerHTML = categories.map(cat => 
                `<button class="category-btn" onclick="selectCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.textContent === category);
            });
        }

        function parseSMS() {
            const sms = document.getElementById('sms-text').value;
            const patterns = [
                /(?:Rs\.?|INR|₹)\s*(\d+(?:,\d+)*(?:\.\d{2})?)/i,
                /(?:debited|paid|spent|withdrawn|sent|credited|received).*?(\d+(?:,\d+)*(?:\.\d{2})?)/i,
                /(\d+(?:,\d+)*(?:\.\d{2})?)\s*(?:Rs\.?|INR|₹)/i
            ];

            for (let pattern of patterns) {
                const match = sms.match(pattern);
                if (match) {
                    const amount = match[1].replace(/,/g, '');
                    document.getElementById('amount').value = amount;
                    
                    const merchantPatterns = [
                        /(?:to|at)\s+([A-Z][A-Za-z0-9\s]+?)(?:\s+via|\s+on|\s+UPI|$|\.)/,
                        /(?:paid|sent|credited).*?(?:to|from)\s+([A-Z][A-Za-z0-9\s]+)/
                    ];
                    
                    for (let mp of merchantPatterns) {
                        const merchantMatch = sms.match(mp);
                        if (merchantMatch) {
                            document.getElementById('description').value = merchantMatch[1].trim();
                            break;
                        }
                    }
                    
                    alert('✅ Amount extracted: ₹' + amount);
                    return;
                }
            }
            
            alert('❌ Could not extract amount');
        }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value || (currentModalType === 'expense' ? 'Expense' : 'Income');
            const dateInput = document.getElementById('transaction-date').value;
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            if (!selectedCategory) {
                alert('Please select a category');
                return;
            }

            const transaction = {
                id: Date.now(),
                type: currentModalType,
                amount,
                category: selectedCategory,
                description,
                date: dateInput ? new Date(dateInput).toISOString() : new Date().toISOString()
            };

            data.transactions.unshift(transaction);
            saveData();
            updateUI();
            closeModal();
            
            alert('✅ Transaction added!');
        }

        function renderRecentTransactions() {
            const list = document.getElementById('recent-transactions');
            const recent = data.transactions.slice(0, 5);

            if (recent.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">💳</div><div class="empty-text">No transactions yet</div></div>';
                return;
            }

            list.innerHTML = recent.map(t => {
                const date = new Date(t.date);
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${t.type}">
                            ${t.type === 'expense' ? '💸' : '💰'}
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${t.category} • ${date.toLocaleDateString()}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'expense' ? '-' : '+'}₹${t.amount.toFixed(0)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
                    </div>
                `;
            }).join('');
        }

        function renderAllTransactions() {
            const list = document.getElementById('all-transactions');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));

            if (thisMonth.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">💳</div><div class="empty-text">No transactions this month</div></div>';
                return;
            }

            list.innerHTML = thisMonth.map(t => {
                const date = new Date(t.date);
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${t.type}">
                            ${t.type === 'expense' ? '💸' : '💰'}
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${t.category} • ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'expense' ? '-' : '+'}₹${t.amount.toFixed(0)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
                    </div>
                `;
            }).join('');
        }

        function deleteTransaction(id) {
            if (!confirm('Delete this transaction?')) return;
            data.transactions = data.transactions.filter(t => t.id !== id);
            saveData();
            updateUI();
        }

        function renderDailyBreakdown() {
            const container = document.getElementById('daily-breakdown');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            
            const byDay = {};
            thisMonth.forEach(t => {
                const date = new Date(t.date).toLocaleDateString();
                if (!byDay[date]) byDay[date] = [];
                byDay[date].push(t);
            });

            const days = Object.entries(byDay).sort((a, b) => new Date(b[0]) - new Date(a[0])).slice(0, 7);

            if (days.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No daily data</div></div>';
                return;
            }

            container.innerHTML = days.map(([date, transactions]) => {
                const expenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                
                return `
                    <div class="day-item">
                        <div class="day-header" onclick="toggleDay(event)">
                            <div>
                                <div class="day-date">${new Date(date).toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'})}</div>
                                <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">
                                    ${transactions.length} transaction${transactions.length > 1 ? 's' : ''}
                                </div>
                            </div>
                            <div>
                                <div class="day-total">-₹${expenses.toFixed(0)}</div>
                                ${income > 0 ? `<div style="font-size: 12px; color: var(--success); text-align: right;">+₹${income.toFixed(0)}</div>` : ''}
                            </div>
                        </div>
                        <div class="day-transactions">
                            ${transactions.map(t => `
                                <div class="transaction-item">
                                    <div class="transaction-icon ${t.type}">${t.type === 'expense' ? '💸' : '💰'}</div>
                                    <div class="transaction-details">
                                        <div class="transaction-title">${t.description}</div>
                                        <div class="transaction-meta">${t.category}</div>
                                    </div>
                                    <div class="transaction-amount ${t.type}">${t.type === 'expense' ? '-' : '+'}₹${t.amount.toFixed(0)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleDay(event) {
            const dayItem = event.currentTarget.closest('.day-item');
            const transactions = dayItem.querySelector('.day-transactions');
            transactions.classList.toggle('expanded');
        }

        function renderCategoryChart() {
            const container = document.getElementById('category-chart');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date) && t.type === 'expense');
            
            const categoryTotals = {};
            thisMonth.forEach(t => {
                categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
            });

            const total = Object.values(categoryTotals).reduce((sum, val) => sum + val, 0);
            
            if (total === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">No expense data</div></div>';
                return;
            }

            container.innerHTML = Object.entries(categoryTotals)
                .sort((a, b) => b[1] - a[1])
                .map(([category, amount]) => {
                    const percent = (amount / total * 100).toFixed(1);
                    return `
                        <div class="chart-bar">
                            <div class="chart-header">
                                <span class="chart-category">${category}</span>
                                <span class="chart-amount">₹${amount.toFixed(0)} (${percent}%)</span>
                            </div>
                            <div class="chart-progress">
                                <div class="chart-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
        }

        function renderMonthlyStats() {
            const container = document.getElementById('monthly-stats');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const now = new Date();
            const avgDaily = expenses / now.getDate();
            const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate();

            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Income</div>
                    <div class="stat-value" style="color: var(--success);">₹${income.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Expenses</div>
                    <div class="stat-value" style="color: var(--danger);">₹${expenses.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg. Daily Spend</div>
                    <div class="stat-value">₹${avgDaily.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Days Remaining</div>
                    <div class="stat-value">${daysLeft}</div>
                </div>
            `;
        }

        function renderCategoryManager() {
            const container = document.getElementById('category-manager');
            container.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); font-size: 13px;">EXPENSE CATEGORIES</div>
                    ${data.expenseCategories.map((cat, idx) => `
                        <div class="category-item">
                            <span>${cat}</span>
                            ${idx >= DEFAULT_EXPENSE_CATEGORIES.length ? `<button class="delete-btn" onclick="deleteCategory('expense', ${idx})">✕</button>` : ''}
                        </div>
                    `).join('')}
                </div>
                <div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); font-size: 13px;">INCOME CATEGORIES</div>
                    ${data.incomeCategories.map((cat, idx) => `
                        <div class="category-item">
                            <span>${cat}</span>
                            ${idx >= DEFAULT_INCOME_CATEGORIES.length ? `<button class="delete-btn" onclick="deleteCategory('income', ${idx})">✕</button>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addNewCategory() {
            const type = prompt('Add to:\n1. Expense categories\n2. Income categories\n\nEnter 1 or 2:');
            if (!type || (type !== '1' && type !== '2')) return;
            
            const name = prompt('Category name (with emoji):');
            if (!name) return;

            if (type === '1') {
                data.expenseCategories.push(name);
            } else {
                data.incomeCategories.push(name);
            }
            
            saveData();
            renderCategoryManager();
        }

        function deleteCategory(type, index) {
            if (!confirm('Delete this category?')) return;
            
            if (type === 'expense') {
                data.expenseCategories.splice(index, 1);
            } else {
                data.incomeCategories.splice(index, 1);
            }
            
            saveData();
            renderCategoryManager();
        }

        function saveLimits() {
            data.limits.monthly = parseFloat(document.getElementById('monthly-limit').value) || 0;
            data.limits.weekly = parseFloat(document.getElementById('weekly-limit').value) || 0;
            saveData();
            checkLimits();
            alert('✅ Limits saved!');
        }

        function checkLimits() {
            const warnings = [];
            const now = new Date();
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date) && t.type === 'expense');
            const monthlySpent = thisMonth.reduce((sum, t) => sum + t.amount, 0);
            
            if (data.limits.monthly > 0 && monthlySpent >= data.limits.monthly * 0.8) {
                const percent = ((monthlySpent / data.limits.monthly) * 100).toFixed(0);
                warnings.push(`⚠️ Monthly limit: ${percent}% used (₹${monthlySpent.toFixed(0)} / ₹${data.limits.monthly})`);
            }
            
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const thisWeek = data.transactions.filter(t => new Date(t.date) >= weekAgo && t.type === 'expense');
            const weeklySpent = thisWeek.reduce((sum, t) => sum + t.amount, 0);
            
            if (data.limits.weekly > 0 && weeklySpent >= data.limits.weekly * 0.8) {
                const percent = ((weeklySpent / data.limits.weekly) * 100).toFixed(0);
                warnings.push(`⚠️ Weekly limit: ${percent}% used (₹${weeklySpent.toFixed(0)} / ₹${data.limits.weekly})`);
            }
            
            const container = document.getElementById('warning-container');
            if (warnings.length > 0) {
                container.innerHTML = warnings.map(w => `<div class="warning-badge">${w}</div>`).join('');
            } else {
                container.innerHTML = '';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
            
            const titles = {
                home: 'Overview',
                transactions: 'Transactions',
                insights: 'Insights',
                settings: 'Settings'
            };
            document.getElementById('header-title').textContent = titles[tab] || 'Overview';
            
            if (tab === 'insights') {
                renderCategoryChart();
                renderMonthlyStats();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `expense-tracker-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            alert('✅ Data exported!');
        }

        // Update greeting
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Good Morning';
            if (hour >= 12 && hour < 17) greeting = 'Good Afternoon';
            else if (hour >= 17) greeting = 'Good Evening';
            document.querySelector('.header-greeting').textContent = greeting;
        }

        // Initialize
        loadData();
        updateGreeting();
        setInterval(updateGreeting, 60000);
    </script>
</body>
</html>
