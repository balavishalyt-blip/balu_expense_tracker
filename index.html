<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>NOVA // WEALTH</title>
    
    <!-- Premium Font Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Core Palette */
            --bg: #000000;
            --surface-0: #0A0A0A;
            --surface-1: #121212;
            --surface-2: #1C1C1C;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            /* Typography Colors */
            --text-primary: #FFFFFF;
            --text-secondary: #8A8A93;
            --text-tertiary: #55555C;

            /* Accents */
            --neon-mint: #00FF9D;
            --neon-coral: #FF4D4D;
            --accent-brand: #FFFFFF;
            
            /* Gradients */
            --glow-mint: rgba(0, 255, 157, 0.15);
            --glow-coral: rgba(255, 77, 77, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- TYPOGRAPHY UTILS --- */
        .font-num { font-family: 'Space Grotesk', sans-serif; }
        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #999999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            z-index: 50;
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand::before {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            background: var(--text-primary);
            border-radius: 2px;
        }

        .profile-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- HERO BALANCE --- */
        .hero-section {
            padding: 40px 0;
            text-align: center;
            position: relative;
        }

        /* Ambient glowing orb behind balance */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
        }

        .balance-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .balance-value {
            font-size: clamp(48px, 12vw, 72px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 8px;
        }

        /* --- QUICK ACTIONS --- */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn-action {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-action:active {
            transform: scale(0.96);
            background: var(--surface-2);
        }

        .action-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action.pay .action-icon-wrap {
            background: var(--glow-coral);
            color: var(--neon-coral);
        }

        .btn-action.receive .action-icon-wrap {
            background: var(--glow-mint);
            color: var(--neon-mint);
        }

        .action-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* --- SECTIONS --- */
        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }
        .section-link:hover { color: var(--text-primary); }

        /* --- LISTS & ITEMS --- */
        .ledger-card {
            background: var(--surface-0);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 8px;
        }

        .tx-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 20px;
            background: transparent;
            transition: background 0.2s;
            position: relative;
        }

        .tx-item:active { background: var(--surface-1); }

        .tx-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 16px;
        }

        .tx-info {
            flex: 1;
            min-width: 0;
        }

        .tx-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .tx-cat {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .tx-amount-wrap {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tx-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tx-amount.expense { color: var(--text-primary); }
        .tx-amount.income { color: var(--neon-mint); }

        /* Quick actions inside list item */
        .tx-actions {
            display: flex;
            gap: 8px;
        }
        .tx-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            padding: 8px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .tx-btn:active { color: var(--text-primary); }

        /* --- STATS GRID --- */
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            background: var(--surface-0);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
        }
        .metric-card.positive::before { background: var(--neon-mint); box-shadow: 0 0 20px var(--glow-mint); }
        .metric-card.negative::before { background: var(--neon-coral); box-shadow: 0 0 20px var(--glow-coral); }

        .metric-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .metric-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* --- BREAKDOWN BARS --- */
        .breakdown-card {
            background: var(--surface-0);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px 24px;
        }

        .bar-wrap { margin-bottom: 24px; }
        .bar-wrap:last-child { margin-bottom: 0; }

        .bar-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
        }

        .bar-track {
            height: 6px;
            background: var(--surface-2);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- BOTTOM NAV (FLOATING PILL) --- */
        .nav-wrapper {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 20px;
            pointer-events: none; /* Let clicks pass through container */
        }

        .nav-pill {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 40px;
            display: flex;
            padding: 8px;
            gap: 8px;
            pointer-events: auto; /* Re-enable clicks for pill */
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .nav-item {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            width: 56px;
            height: 56px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            background: var(--surface-2);
            color: var(--text-primary);
        }

        .nav-item svg { width: 24px; height: 24px; }

        /* --- TABS --- */
        .tab-view { display: none; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-view.active { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MODAL (BOTTOM SHEET) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .sheet {
            background: var(--surface-0);
            width: 100%;
            max-width: 600px;
            border-radius: 32px 32px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 0 24px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            margin: 16px auto 24px;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .sheet-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .btn-close {
            background: var(--surface-2);
            border: none;
            width: 36px; height: 36px;
            border-radius: 18px;
            color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* --- FORMS --- */
        .form-group { margin-bottom: 24px; }
        
        .label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .input-elegant {
            width: 100%;
            background: var(--surface-1);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .input-elegant:focus {
            outline: none;
            border-color: var(--text-secondary);
            background: var(--surface-2);
        }

        /* Huge amount input inside modal */
        .amount-input-wrap {
            position: relative;
            margin-bottom: 32px;
        }
        .amount-symbol {
            position: absolute;
            left: 20px; top: 50%; transform: translateY(-50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px; font-weight: 700; color: var(--text-secondary);
        }
        .input-huge {
            width: 100%;
            background: transparent;
            border: none; border-bottom: 2px solid var(--surface-2);
            padding: 20px 20px 20px 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px; font-weight: 800;
            color: var(--text-primary);
            border-radius: 0;
        }
        .input-huge:focus { outline: none; border-color: var(--text-primary); }

        .pill-group {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .pill {
            background: var(--surface-1);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pill.active { background: var(--text-primary); color: var(--bg); }

        .btn-primary {
            width: 100%;
            background: var(--text-primary);
            color: var(--bg);
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .empty-box {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* PDF hidden canvas */
        #pdf-canvas { display: none; }
    </style>
</head>
<body>

    <!-- TOP NAV -->
    <header>
        <div class="brand">NOVA</div>
        <div class="profile-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </header>

    <div class="container">
        
        <!-- ================= HOME TAB ================= -->
        <div id="tab-home" class="tab-view active">
            
            <div class="hero-section">
                <div class="balance-label">Net Wealth</div>
                <div class="balance-value font-num text-gradient">₹<span id="ui-balance">0</span></div>
            </div>

            <div class="quick-actions">
                <div class="btn-action pay" onclick="openSheet('expense')">
                    <div class="action-icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <div class="action-text">Add Expense</div>
                </div>
                <div class="btn-action receive" onclick="openSheet('income')">
                    <div class="action-icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    </div>
                    <div class="action-text">Add Income</div>
                </div>
            </div>

            <div>
                <div class="section-head">
                    <div class="section-title">Recent Activity</div>
                    <button class="section-link" onclick="switchTab('ledger')">See All</button>
                </div>
                <div class="ledger-card">
                    <div id="ui-recent"></div>
                </div>
            </div>

        </div>

        <!-- ================= LEDGER TAB ================= -->
        <div id="tab-ledger" class="tab-view">
            <div class="section-head" style="margin-top:20px;">
                <div class="section-title">Ledger</div>
            </div>
            <div class="ledger-card">
                <div id="ui-all-tx"></div>
            </div>
        </div>

        <!-- ================= INSIGHTS TAB ================= -->
        <div id="tab-insights" class="tab-view">
            
            <div class="section-head" style="margin-top:20px;">
                <div class="section-title">Metrics</div>
            </div>
            <div class="metric-grid" id="ui-metrics">
                <!-- Dynamically populated -->
            </div>

            <div class="section-head" style="margin-top:40px;">
                <div class="section-title">Breakdown</div>
            </div>
            <div class="breakdown-card" id="ui-breakdown">
                <!-- Dynamically populated -->
            </div>

        </div>

        <!-- ================= SETTINGS TAB ================= -->
        <div id="tab-settings" class="tab-view">
            
            <div class="section-head" style="margin-top:20px;">
                <div class="section-title">Limits</div>
            </div>
            <div class="card">
                <div class="form-group">
                    <label class="label">Monthly Budget Limit</label>
                    <input type="number" id="inp-limit-m" class="input-elegant" placeholder="0" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label class="label">Weekly Budget Limit</label>
                    <input type="number" id="inp-limit-w" class="input-elegant" placeholder="0" inputmode="numeric">
                </div>
                <button class="btn-primary" onclick="saveLimits()">Save Rules</button>
            </div>

            <div class="section-head" style="margin-top:40px;">
                <div class="section-title">AI Engine</div>
            </div>
            <div class="card">
                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                    Run a diagnostic on your spending pattern. Gemini AI will generate a PDF visual report with personalized financial interventions.
                </p>
                <button class="btn-primary" id="btn-ai" onclick="runAI()">
                    <span id="ai-txt">Generate Smart Report</span>
                </button>
            </div>

        </div>

    </div>

    <!-- ================= BOTTOM NAV ================= -->
    <div class="nav-wrapper">
        <nav class="nav-pill">
            <button class="nav-item active" onclick="switchTab('home')" id="nav-home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
            <button class="nav-item" onclick="switchTab('ledger')" id="nav-ledger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
            <button class="nav-item" onclick="switchTab('insights')" id="nav-insights">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
            </button>
            <button class="nav-item" onclick="switchTab('settings')" id="nav-settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </nav>
    </div>

    <!-- ================= MODAL (BOTTOM SHEET) ================= -->
    <div class="modal-overlay" id="tx-sheet">
        <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <div class="sheet-title" id="sheet-title">Add Record</div>
                <button class="btn-close" onclick="closeSheet()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Giant Amount Input -->
            <div class="amount-input-wrap">
                <span class="amount-symbol">₹</span>
                <input type="number" id="inp-amount" class="input-huge" placeholder="0" inputmode="decimal">
            </div>

            <div class="form-group">
                <label class="label">Category</label>
                <div class="pill-group" id="ui-categories"></div>
            </div>

            <div class="form-group">
                <label class="label">Notes / Merchant</label>
                <input type="text" id="inp-desc" class="input-elegant" placeholder="E.g. Uber, Groceries, Amazon">
            </div>

            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label class="label">Date</label>
                    <input type="date" id="inp-date" class="input-elegant">
                </div>
                <div id="recurring-wrap">
                    <label class="label" style="opacity:0;">Recurring</label>
                    <div style="height: 60px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 20px; display:flex; align-items:center; padding: 0 16px; gap:10px;">
                        <input type="checkbox" id="inp-recur" style="width:18px; height:18px; accent-color: var(--text-primary);">
                        <span style="font-weight:600; font-size: 14px;">Monthly</span>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="btn-save-tx" onclick="saveTransaction()">Confirm</button>
            
            <div class="form-group" style="margin-top:32px;">
                <label class="label">Auto Extract (Paste Bank SMS)</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="inp-sms" class="input-elegant" style="padding: 14px;" placeholder="Paste SMS here...">
                    <button class="btn-secondary" style="width:auto; margin:0; padding:0 20px; border-radius: 16px; border:none; font-weight:600;" onclick="parseSMS()">Parse</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden Canvas for PDF Chart -->
    <canvas id="pdf-canvas" width="400" height="400"></canvas>

    <script>
        // --- CORE DATA CONFIG --- //
        // 🔒 MANDATORY: Storage key remains strictly as requested for 100% data safety.
        const STORAGE_KEY = 'expenseTrackerData';
        const apiKey = ""; // Add Gemini Key if hosted externally

        const EMOJI_MAP = {
            'Food & Dining': '🍔', 'Transport': '🚗', 'Shopping': '🛍️', 'Bills & Utilities': '💡',
            'Entertainment': '🎬', 'Healthcare': '🏥', 'Groceries': '🛒', 'Personal': '💆',
            'Education': '📚', 'Responsibilities': '🤝', 'Rent/EMI': '🏠', 'Other': '📦',
            'Salary': '💰', 'Freelance': '💻', 'Gift': '🎁', 'Investment': '📈', 'Bonus': '🎉', 'Refund': '↩️'
        };

        const CATS_EXPENSE = ['Food & Dining', 'Transport', 'Shopping', 'Bills & Utilities', 'Entertainment', 'Healthcare', 'Groceries', 'Personal', 'Education', 'Responsibilities', 'Rent/EMI', 'Other'];
        const CATS_INCOME = ['Salary', 'Freelance', 'Gift', 'Investment', 'Bonus', 'Refund', 'Other'];

        let DB = { transactions: [], limits: { monthly: 0, weekly: 0 } };
        
        // Modal State
        let stateMode = 'expense'; // 'expense' | 'income'
        let stateCat = '';
        let stateEditId = null;

        // --- INIT & BOOT --- //
        function initApp() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                // Backward compatibility fix if they had old structure
                if (parsed.expenses && !parsed.transactions) {
                    DB.transactions = parsed.expenses.map(e => ({...e, type: 'expense', isRecurring: false}));
                    DB.limits = parsed.limits || { monthly: 0, weekly: 0 };
                } else {
                    DB = parsed;
                }
            }
            
            // Normalize old data (e.g. 'Bills' -> 'Bills & Utilities')
            DB.transactions = DB.transactions.map(t => ({
                ...t, 
                category: t.category === 'Bills' ? 'Bills & Utilities' : t.category,
                type: t.type || 'expense',
                isRecurring: t.isRecurring || false
            }));

            renderAll();
        }

        function saveDB() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
            renderAll();
        }

        // --- RENDERING ENGINE --- //
        function renderAll() {
            calcHeroBalance();
            renderList('ui-recent', 5);
            renderList('ui-all-tx', 999);
            renderMetrics();
            renderBreakdown();
            document.getElementById('inp-limit-m').value = DB.limits.monthly || '';
            document.getElementById('inp-limit-w').value = DB.limits.weekly || '';
        }

        function calcHeroBalance() {
            const currentMonth = DB.transactions.filter(t => isCurrentMonth(t.date));
            const inc = sumTx(currentMonth, 'income');
            const exp = sumTx(currentMonth, 'expense');
            const net = inc - exp;
            
            document.getElementById('ui-balance').textContent = net.toLocaleString('en-IN');
        }

        function renderList(domId, limit) {
            const container = document.getElementById(domId);
            const items = domId === 'ui-all-tx' 
                ? DB.transactions.filter(t => isCurrentMonth(t.date)) 
                : DB.transactions.slice(0, limit);

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-box">No records to display.</div>';
                return;
            }

            container.innerHTML = items.map(t => {
                const isExp = t.type === 'expense';
                const sign = isExp ? '-' : '+';
                const emoji = EMOJI_MAP[t.category] || '⌘';
                const dt = new Date(t.date).toLocaleDateString('en-US', {day:'numeric', month:'short'});
                
                return `
                <div class="tx-item">
                    <div class="tx-icon">${emoji}</div>
                    <div class="tx-info">
                        <div class="tx-title">${t.description}</div>
                        <div class="tx-cat">${t.category}</div>
                    </div>
                    <div class="tx-amount-wrap">
                        <div style="text-align: right;">
                            <div class="tx-amount ${t.type}">${sign}₹${t.amount.toLocaleString('en-IN')}</div>
                            <div style="font-size:11px; color:var(--text-tertiary); font-weight:600; margin-top:4px;">${dt}</div>
                        </div>
                        <div class="tx-actions">
                            <button class="tx-btn" onclick="openEdit(${t.id})">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="tx-btn" onclick="deleteTx(${t.id})">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderMetrics() {
            const cMonth = DB.transactions.filter(t => isCurrentMonth(t.date));
            const inc = sumTx(cMonth, 'income');
            const exp = sumTx(cMonth, 'expense');
            
            const today = new Date().getDate();
            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            const avg = today > 0 ? (exp / today) : 0;
            const left = daysInMonth - today;

            document.getElementById('ui-metrics').innerHTML = `
                <div class="metric-card positive">
                    <div class="metric-label">Income</div>
                    <div class="metric-val" style="color:var(--neon-mint)">₹${inc.toLocaleString('en-IN')}</div>
                </div>
                <div class="metric-card negative">
                    <div class="metric-label">Expenses</div>
                    <div class="metric-val" style="color:var(--neon-coral)">₹${exp.toLocaleString('en-IN')}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Daily Avg</div>
                    <div class="metric-val">₹${avg.toLocaleString('en-IN', {maximumFractionDigits:0})}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Days Left</div>
                    <div class="metric-val">${left}</div>
                </div>
            `;
        }

        function renderBreakdown() {
            const exps = DB.transactions.filter(t => isCurrentMonth(t.date) && t.type === 'expense');
            const total = exps.reduce((s, t) => s + t.amount, 0);
            const box = document.getElementById('ui-breakdown');

            if (total === 0) {
                box.innerHTML = '<div class="empty-box">No data available yet.</div>';
                return;
            }

            const map = {};
            exps.forEach(t => map[t.category] = (map[t.category] || 0) + t.amount);
            
            const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]);

            box.innerHTML = sorted.map(([cat, amt]) => {
                const pct = ((amt/total)*100).toFixed(1);
                const emoji = EMOJI_MAP[cat] || '📦';
                return `
                <div class="bar-wrap">
                    <div class="bar-head">
                        <div class="chart-label">${emoji} ${cat}</div>
                        <div class="chart-value">₹${amt.toLocaleString('en-IN')} <span style="opacity:0.5; margin-left:8px;">${pct}%</span></div>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${pct}%"></div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- UI / NAVIGATION LOGIC --- //
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active');
            
            const titles = { home: 'Overview', ledger: 'Ledger', insights: 'Intelligence', settings: 'Preferences' };
            document.getElementById('page-title').textContent = titles[tabId];
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // --- SHEET (MODAL) LOGIC --- //
        function openSheet(type) {
            stateMode = type;
            stateEditId = null;
            stateCat = '';
            
            document.getElementById('sheet-title').textContent = type === 'expense' ? 'Add Expense' : 'Add Income';
            document.getElementById('btn-save-tx').textContent = 'Confirm Record';
            
            // Reset fields
            document.getElementById('inp-amount').value = '';
            document.getElementById('inp-desc').value = '';
            document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('inp-recur').checked = false;
            document.getElementById('inp-sms').value = '';
            
            document.getElementById('recurring-wrap').style.display = type === 'expense' ? 'block' : 'none';
            
            buildPills();
            document.getElementById('tx-sheet').classList.add('show');
        }

        function openEdit(id) {
            const tx = DB.transactions.find(t => t.id === id);
            if (!tx) return;

            stateMode = tx.type;
            stateEditId = id;
            stateCat = tx.category;

            document.getElementById('sheet-title').textContent = 'Modify Record';
            document.getElementById('btn-save-tx').textContent = 'Update';
            
            document.getElementById('inp-amount').value = tx.amount;
            document.getElementById('inp-desc').value = tx.description;
            document.getElementById('inp-date').value = new Date(tx.date).toISOString().split('T')[0];
            document.getElementById('inp-recur').checked = tx.isRecurring || false;
            
            document.getElementById('recurring-wrap').style.display = tx.type === 'expense' ? 'block' : 'none';
            
            buildPills();
            document.getElementById('tx-sheet').classList.add('show');
        }

        function closeSheet() {
            document.getElementById('tx-sheet').classList.remove('show');
        }

        function buildPills() {
            const list = stateMode === 'expense' ? CATS_EXPENSE : CATS_INCOME;
            document.getElementById('ui-categories').innerHTML = list.map(c => 
                `<div class="pill ${c === stateCat ? 'active' : ''}" onclick="selectCat('${c}')">${c}</div>`
            ).join('');
        }

        function selectCat(cat) {
            stateCat = cat;
            buildPills();
        }

        // --- DATA MUTATION --- //
        function saveTransaction() {
            const amt = parseFloat(document.getElementById('inp-amount').value);
            const desc = document.getElementById('inp-desc').value.trim() || (stateMode === 'expense' ? 'Expense' : 'Income');
            const dStr = document.getElementById('inp-date').value;
            const rec = document.getElementById('inp-recur').checked;

            if (!amt || amt <= 0) return alert('Invalid amount');
            if (!stateCat) return alert('Select a category');

            const payload = {
                id: stateEditId || Date.now(),
                type: stateMode,
                amount: amt,
                category: stateCat,
                description: desc,
                date: dStr ? new Date(dStr).toISOString() : new Date().toISOString(),
                isRecurring: stateMode === 'expense' ? rec : false
            };

            if (stateEditId) {
                const idx = DB.transactions.findIndex(t => t.id === stateEditId);
                if (idx > -1) DB.transactions[idx] = payload;
            } else {
                DB.transactions.unshift(payload);
            }

            saveDB();
            closeSheet();
        }

        function deleteTx(id) {
            if(!confirm('Permanently delete this record?')) return;
            DB.transactions = DB.transactions.filter(t => t.id !== id);
            saveDB();
        }

        function saveLimits() {
            DB.limits.monthly = parseFloat(document.getElementById('inp-limit-m').value) || 0;
            DB.limits.weekly = parseFloat(document.getElementById('inp-limit-w').value) || 0;
            saveDB();
            alert('Limits updated securely.');
        }

        function parseSMS() {
            const text = document.getElementById('inp-sms').value;
            const match = text.match(/(?:Rs\.?|INR|₹)\s*(\d+(?:,\d+)*(?:\.\d{2})?)/i);
            if (match) {
                document.getElementById('inp-amount').value = match[1].replace(/,/g, '');
            } else {
                alert('No amount detected in text.');
            }
        }

        // --- UTILS --- //
        function isCurrentMonth(dStr) {
            const d = new Date(dStr), n = new Date();
            return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
        }
        function sumTx(arr, type) {
            return arr.filter(t=>t.type===type).reduce((s,t)=>s+t.amount, 0);
        }

        // --- AI PDF EXPORT LOGIC --- //
        async function fetchAI(inc, exp, breakdown) {
            const bdStr = Object.entries(breakdown).map(([c,a]) => `${c}: ₹${a}`).join(', ');
            const prompt = `Act as an expert financial advisor. Month data: Income ₹${inc}, Expense ₹${exp}. Breakdown: ${bdStr}. Give 3 highly actionable bullet points of financial advice. Under 100 words. Plain text only (1., 2., 3.). No markdown.`;
            
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            const models = ['gemini-2.5-flash-preview-09-2025', 'gemini-2.5-flash', 'gemini-1.5-flash'];

            for (const m of models) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (res.status === 404) continue;
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Keep tracking your finances.";
                } catch (e) {}
            }
            return "Optimize your spending and save more.";
        }

        function getChartB64(map) {
            return new Promise(res => {
                const ctx = document.getElementById('pdf-canvas').getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(map),
                        datasets: [{ data: Object.values(map), backgroundColor: ['#00FF9D', '#FF4D4D', '#FFFFFF', '#8A8A93', '#50E3C2', '#FFC107'], borderWidth:0 }]
                    },
                    options: { animation: false, responsive: false }
                });
                const b64 = chart.toBase64Image();
                chart.destroy();
                res(b64);
            });
        }

        async function runAI() {
            const btn = document.getElementById('btn-ai');
            const txt = document.getElementById('ai-txt');
            btn.style.opacity = 0.5; txt.textContent = "Running Diagnostics...";

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const cMonth = DB.transactions.filter(t => isCurrentMonth(t.date));
                const inc = sumTx(cMonth, 'income');
                const exp = sumTx(cMonth, 'expense');
                
                const map = {};
                cMonth.filter(t=>t.type==='expense').forEach(t => map[t.category] = (map[t.category]||0) + t.amount);

                const aiText = await fetchAI(inc, exp, map);
                let img = null; if(Object.keys(map).length) img = await getChartB64(map);

                // Build PDF Structure
                doc.setFillColor(10, 10, 10); doc.rect(0,0,210,300,'F');
                doc.setTextColor(255, 255, 255);
                
                doc.setFontSize(22); doc.setFont("helvetica", "bold");
                doc.text("NOVA // WEALTH REPORT", 20, 25);
                
                doc.setFontSize(10); doc.setTextColor(150, 150, 150);
                doc.text(`Generated: ${new Date().toLocaleDateString()}`, 20, 32);

                doc.setDrawColor(40,40,40); doc.line(20, 40, 190, 40);

                doc.setFontSize(14); doc.setTextColor(0, 255, 157);
                doc.text(`INFLOW: Rs ${inc.toLocaleString('en-IN')}`, 20, 55);
                doc.setTextColor(255, 77, 77);
                doc.text(`OUTFLOW: Rs ${exp.toLocaleString('en-IN')}`, 20, 65);
                doc.setTextColor(255, 255, 255);
                doc.text(`NET YIELD: Rs ${(inc-exp).toLocaleString('en-IN')}`, 20, 75);

                if (img) doc.addImage(img, 'PNG', 110, 45, 80, 80);

                doc.line(20, 135, 190, 135);
                doc.setFontSize(16); doc.text("AI DIAGNOSTICS", 20, 150);
                
                doc.setFontSize(11); doc.setFont("helvetica", "normal");
                const split = doc.splitTextToSize(aiText, 170);
                doc.text(split, 20, 160);

                doc.save(`NOVA-Report-${Date.now()}.pdf`);
            } catch (e) {
                alert("Generation failed. Check console.");
            } finally {
                btn.style.opacity = 1; txt.textContent = "Generate Smart Report";
            }
        }

        // Run
        initApp();
    </script>
</body>
</html>
