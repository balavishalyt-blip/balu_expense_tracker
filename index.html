<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NOVA // FINANCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #000000; /* Pure black from screenshot */
            --surface: #151515; /* Dark grey cards */
            --surface-elevated: #222222;
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --text-dimmer: #6B6B6B;
            --accent-cyan: #4ECDC4;
            --accent-red: #FF6B6B;
            --border: #2A2A2A;
        }

        body {
            font-family: 'Work Sans', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            padding: 40px 20px 20px;
            background: var(--bg-dark);
        }

        .logo-nova {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #D0D0D0;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .page-title {
            font-family: 'Work Sans', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .container {
            padding: 0 20px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Home Balance Section Re-styled */
        .balance-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 32px;
            border-top: 3px solid var(--accent-cyan);
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 24px;
            color: var(--accent-cyan);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .action-btn {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .action-btn:active {
            transform: scale(0.97);
            background: var(--surface-elevated);
        }

        .action-icon {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--accent-red);
        }

        .action-btn.income .action-icon {
            color: var(--accent-cyan);
        }

        .action-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .section {
            margin-bottom: 32px;
            margin-top: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Work Sans', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .section-link {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Breakdown Styling */
        .breakdown-card {
            padding: 24px 20px;
        }

        .chart-item {
            margin-bottom: 24px;
        }
        .chart-item:last-child {
            margin-bottom: 0;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }

        .chart-label {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-value {
            font-family: 'Work Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
        }

        .chart-track {
            height: 8px;
            background: #2A2A2C;
            border-radius: 4px;
            overflow: hidden;
        }

        .chart-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red) 0%, var(--accent-cyan) 100%);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Stats Grid Styling from Screenshot */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            position: relative;
        }

        .stat-card.cyan-top { border-top: 3px solid var(--accent-cyan); }
        .stat-card.red-top { border-top: 3px solid var(--accent-red); }

        .stat-card-label {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .stat-card-value {
            font-family: 'Syne', sans-serif;
            font-size: clamp(22px, 6vw, 32px);
            font-weight: 800;
            letter-spacing: -1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .stat-card-value.cyan-text { color: var(--accent-cyan); }
        .stat-card-value.red-text { color: var(--accent-red); }
        .stat-card-value.white-text { color: var(--text); }

        /* Transactions List */
        .transaction-item {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-content {
            flex: 1;
            min-width: 0;
            margin-right: 12px;
        }

        .transaction-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .transaction-meta {
            font-size: 12px;
            color: var(--text-dimmer);
        }

        .transaction-amount {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
        }

        .transaction-amount.expense { color: var(--accent-red); }
        .transaction-amount.income { color: var(--accent-cyan); }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--surface-elevated);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Bottom Nav matching screenshot */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            border-top: 1px solid #111;
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            transition: color 0.2s;
        }

        .nav-btn.active {
            color: var(--text);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: flex-end;
            backdrop-filter: blur(5px);
        }

        .modal.show { display: flex; }

        .modal-content {
            background: #1C1C1E;
            border-radius: 24px 24px 0 0;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Work Sans', sans-serif;
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--accent-cyan);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-body {
            padding: 0 24px 32px;
        }

        .input-group { margin-bottom: 20px; }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            background: #2A2A2C;
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            font-family: 'Work Sans', sans-serif;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #444;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .category-pill {
            padding: 10px 16px;
            background: #2A2A2C;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-pill.selected {
            background: var(--text);
            color: var(--bg-dark);
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg-dark);
        }

        .btn-secondary {
            background: #2A2A2C;
            color: var(--text);
            margin-top: 8px;
        }

        .checkbox-wrapper {
            background: #2A2A2C;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dimmer);
            font-size: 14px;
        }

        .spinner {
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 2px solid var(--bg-dark);
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #pdf-chart-container {
            position: absolute;
            left: -9999px;
            visibility: hidden;
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-nova">N O V A // F I N A N C E</div>
        <h1 class="page-title" id="page-title">Overview</h1>
    </div>

    <div class="container">
        <!-- HOME TAB -->
        <div class="tab-content active" id="tab-home">
            <div class="balance-card">
                <div class="balance-label">Net Balance</div>
                <div class="balance-amount">₹<span id="available-balance">0</span></div>
            </div>

            <div class="action-grid">
                <div class="action-btn" onclick="openModal('expense')">
                    <div class="action-icon">−</div>
                    <div class="action-label">Add Expense</div>
                </div>
                <div class="action-btn income" onclick="openModal('income')">
                    <div class="action-icon">+</div>
                    <div class="action-label">Add Income</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Recent</h2>
                    <button class="section-link" onclick="switchTab('transactions')">View All</button>
                </div>
                <div class="card">
                    <div id="recent-transactions"></div>
                </div>
            </div>
        </div>

        <!-- TRANSACTIONS/LEDGER TAB -->
        <div class="tab-content" id="tab-transactions">
            <div class="section">
                <div class="card">
                    <div id="all-transactions"></div>
                </div>
            </div>
        </div>

        <!-- INSIGHTS TAB -->
        <div class="tab-content" id="tab-insights">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Breakdown</h2>
                </div>
                <div class="card breakdown-card" id="category-chart"></div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Stats</h2>
                </div>
                <div class="stat-grid" id="monthly-stats">
                    <!-- Injected via JS to match screenshots -->
                </div>
            </div>
        </div>

        <!-- SETTINGS TAB -->
        <div class="tab-content" id="tab-settings">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Limits</h2>
                </div>
                <div class="card breakdown-card">
                    <div class="input-group">
                        <label class="input-label">Monthly Limit</label>
                        <input type="number" id="monthly-limit" placeholder="0" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Weekly Limit</label>
                        <input type="number" id="weekly-limit" placeholder="0" inputmode="decimal">
                    </div>
                    <button class="btn btn-primary" onclick="saveLimits()">Save Limits</button>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">AI Powered Export</h2>
                </div>
                <div class="card breakdown-card">
                    <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 16px; line-height: 1.5;">Generate a visual PDF report with personalized financial insights backed by Gemini AI.</p>
                    <button class="btn btn-primary" id="generate-btn" onclick="generatePDF()">
                        <span class="spinner" id="gen-spinner"></span>
                        <span id="gen-text">Generate Smart Report</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden element for Chart.js to render the PDF chart -->
    <div id="pdf-chart-container">
        <canvas id="pdf-chart"></canvas>
    </div>

    <!-- MODAL -->
    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Add</h2>
                <button class="close-btn" onclick="closeModal()">Close</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">Amount</label>
                    <input type="number" id="amount" placeholder="₹0" inputmode="decimal">
                </div>

                <div class="input-group">
                    <label class="input-label">Category</label>
                    <div class="category-pills" id="category-pills"></div>
                </div>

                <div class="input-group">
                    <label class="input-label">Description</label>
                    <input type="text" id="description" placeholder="What was this for?">
                </div>

                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="date" id="transaction-date">
                </div>

                <div class="input-group" id="recurring-section">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="is-recurring">
                        <label for="is-recurring" style="font-size: 14px; font-weight: 500;">Recurring monthly</label>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label" style="margin-top: 16px;">Quick Extract</label>
                    <textarea id="sms-text" placeholder="Paste bank SMS here..."></textarea>
                    <button class="btn btn-secondary" onclick="parseSMS()">Parse Text</button>
                </div>

                <button class="btn btn-primary" onclick="addTransaction()" id="submit-btn" style="margin-top: 24px;">Save Transaction</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <button class="nav-btn active" onclick="switchTab('home')">
                <span class="nav-icon">⬤</span>
                <span class="nav-label">HOME</span>
            </button>
            <button class="nav-btn" onclick="switchTab('transactions')">
                <span class="nav-icon">▦</span>
                <span class="nav-label">LEDGER</span>
            </button>
            <button class="nav-btn" onclick="switchTab('insights')">
                <span class="nav-icon">◐</span>
                <span class="nav-label">INSIGHTS</span>
            </button>
            <button class="nav-btn" onclick="switchTab('settings')">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">SETTINGS</span>
            </button>
        </div>
    </nav>

    <script>
        const apiKey = ""; // Include your public API key here if hosting externally

        const CATEGORY_MAP = {
            'Food & Dining': '🍔', 'Transport': '🚗', 'Shopping': '🛍️', 'Bills & Utilities': '💡',
            'Entertainment': '🎬', 'Healthcare': '🏥', 'Groceries': '🛒', 'Personal': '💆',
            'Education': '📚', 'Responsibilities': '🤝', 'Rent/EMI': '🏠', 'Other': '📦',
            'Salary': '💰', 'Freelance': '💻', 'Gift': '🎁', 'Investment': '📈',
            'Bonus': '🎉', 'Refund': '↩️'
        };

        const EXPENSE_CATEGORIES = ['Food & Dining', 'Transport', 'Shopping', 'Bills & Utilities', 'Entertainment', 'Healthcare', 'Groceries', 'Personal', 'Education', 'Responsibilities', 'Rent/EMI', 'Other'];
        const INCOME_CATEGORIES = ['Salary', 'Freelance', 'Gift', 'Investment', 'Bonus', 'Refund', 'Other'];

        let data = { transactions: [], limits: { monthly: 0, weekly: 0 } };
        let currentModalType = 'expense';
        let selectedCategory = '';
        let editingTransactionId = null;

        function loadData() {
            const saved = localStorage.getItem('novaFinanceData');
            if (saved) {
                const loaded = JSON.parse(saved);
                if (loaded.expenses && !loaded.transactions) {
                    data.transactions = loaded.expenses.map(e => ({...e, type: 'expense', isRecurring: false}));
                    data.limits = loaded.limits || { monthly: 0, weekly: 0 };
                } else {
                    data = loaded;
                }
            }
            data.transactions = data.transactions.map(t => {
                let cat = t.category;
                if(cat === 'Bills') cat = 'Bills & Utilities'; 
                return {...t, isRecurring: t.isRecurring || false, type: t.type || 'expense', category: cat};
            });
            updateUI();
        }

        function saveData() {
            localStorage.setItem('novaFinanceData', JSON.stringify(data));
        }

        function updateUI() {
            updateBalances();
            renderRecentTransactions();
            renderAllTransactions();
            renderCategoryChart();
            renderMonthlyStats();
            document.getElementById('monthly-limit').value = data.limits.monthly || '';
            document.getElementById('weekly-limit').value = data.limits.weekly || '';
        }

        function updateBalances() {
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expenses;

            document.getElementById('available-balance').textContent = balance.toLocaleString('en-IN');
        }

        function isThisMonth(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
        }

        function openModal(type, transactionId = null) {
            currentModalType = type;
            selectedCategory = '';
            editingTransactionId = transactionId;
            
            if (transactionId) {
                const transaction = data.transactions.find(t => t.id === transactionId);
                if (transaction) {
                    document.getElementById('modal-title').textContent = 'Edit Record';
                    document.getElementById('submit-btn').textContent = 'Update Transaction';
                    document.getElementById('amount').value = transaction.amount;
                    document.getElementById('description').value = transaction.description;
                    document.getElementById('transaction-date').value = new Date(transaction.date).toISOString().split('T')[0];
                    document.getElementById('is-recurring').checked = transaction.isRecurring || false;
                    selectedCategory = transaction.category;
                }
            } else {
                document.getElementById('modal-title').textContent = type === 'expense' ? 'New Expense' : 'New Income';
                document.getElementById('submit-btn').textContent = 'Save Transaction';
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                document.getElementById('sms-text').value = '';
                document.getElementById('transaction-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('is-recurring').checked = false;
            }
            
            document.getElementById('recurring-section').style.display = type === 'expense' ? 'flex' : 'none';
            renderCategoryPills();
            document.getElementById('transaction-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('transaction-modal').classList.remove('show');
            editingTransactionId = null;
        }

        function renderCategoryPills() {
            const categories = currentModalType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
            document.getElementById('category-pills').innerHTML = categories.map(cat => 
                `<span class="category-pill ${cat === selectedCategory ? 'selected' : ''}" onclick="selectCategory('${cat}')">
                    ${CATEGORY_MAP[cat] || ''} ${cat}
                </span>`
            ).join('');
        }

        function selectCategory(category) {
            selectedCategory = category;
            renderCategoryPills();
        }

        function parseSMS() {
            const sms = document.getElementById('sms-text').value;
            const match = sms.match(/(?:Rs\.?|INR|₹)\s*(\d+(?:,\d+)*(?:\.\d{2})?)/i);
            if (match) {
                document.getElementById('amount').value = match[1].replace(/,/g, '');
                alert('✓ Amount extracted');
            } else {
                alert('Could not extract amount');
            }
        }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value || (currentModalType === 'expense' ? 'Expense' : 'Income');
            const dateInput = document.getElementById('transaction-date').value;
            const isRecurring = currentModalType === 'expense' ? document.getElementById('is-recurring').checked : false;
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            if (!selectedCategory) {
                alert('Please select a category');
                return;
            }

            if (editingTransactionId) {
                const index = data.transactions.findIndex(t => t.id === editingTransactionId);
                if (index !== -1) {
                    data.transactions[index] = {...data.transactions[index], amount, category: selectedCategory, description, date: dateInput ? new Date(dateInput).toISOString() : data.transactions[index].date, isRecurring};
                }
            } else {
                data.transactions.unshift({id: Date.now(), type: currentModalType, amount, category: selectedCategory, description, date: dateInput ? new Date(dateInput).toISOString() : new Date().toISOString(), isRecurring});
            }

            saveData();
            updateUI();
            closeModal();
        }

        function editTransaction(id) {
            const transaction = data.transactions.find(t => t.id === id);
            if (transaction) openModal(transaction.type, id);
        }

        function deleteTransaction(id) {
            if (!confirm('Delete this record?')) return;
            data.transactions = data.transactions.filter(t => t.id !== id);
            saveData();
            updateUI();
        }

        function renderRecentTransactions() {
            const list = document.getElementById('recent-transactions');
            const recent = data.transactions.slice(0, 5);
            renderList(list, recent);
        }

        function renderAllTransactions() {
            const list = document.getElementById('all-transactions');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            renderList(list, thisMonth);
        }

        function renderList(container, items) {
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">No records found.</div>';
                return;
            }

            container.innerHTML = items.map(t => {
                const date = new Date(t.date);
                const isExp = t.type === 'expense';
                return `
                    <div class="transaction-item">
                        <div class="transaction-content">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${CATEGORY_MAP[t.category] || ''} ${t.category} · ${date.toLocaleDateString()}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">${isExp ? '−' : '+'}₹${t.amount.toLocaleString('en-IN')}</div>
                        <button class="icon-btn" onclick="editTransaction(${t.id})" style="margin-left: 12px;">✎</button>
                        <button class="icon-btn" onclick="deleteTransaction(${t.id})" style="margin-left: 8px;">×</button>
                    </div>
                `;
            }).join('');
        }

        function renderCategoryChart() {
            const container = document.getElementById('category-chart');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date) && t.type === 'expense');
            const categoryTotals = {};
            thisMonth.forEach(t => categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount);
            const total = Object.values(categoryTotals).reduce((sum, val) => sum + val, 0);
            
            if (total === 0) {
                container.innerHTML = '<div class="empty-state">No expense data for this month.</div>';
                return;
            }

            container.innerHTML = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]).map(([category, amount]) => {
                const percent = (amount / total * 100).toFixed(1);
                const emoji = CATEGORY_MAP[category] || '📦';
                return `
                    <div class="chart-item">
                        <div class="chart-header">
                            <span class="chart-label">${emoji} ${category}</span>
                            <span class="chart-value">₹${amount.toLocaleString('en-IN')} · ${percent}%</span>
                        </div>
                        <div class="chart-track">
                            <div class="chart-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMonthlyStats() {
            const container = document.getElementById('monthly-stats');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            
            const currentDay = new Date().getDate();
            const avgDaily = currentDay > 0 ? expenses / currentDay : 0;
            const daysLeft = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - currentDay;

            container.innerHTML = `
                <div class="stat-card cyan-top">
                    <div class="stat-card-label">Income</div>
                    <div class="stat-card-value cyan-text">₹${income.toLocaleString('en-IN')}</div>
                </div>
                <div class="stat-card red-top">
                    <div class="stat-card-label">Expenses</div>
                    <div class="stat-card-value red-text">₹${expenses.toLocaleString('en-IN')}</div>
                </div>
                <div class="stat-card cyan-top">
                    <div class="stat-card-label">Daily Avg</div>
                    <div class="stat-card-value white-text">₹${avgDaily.toLocaleString('en-IN', {maximumFractionDigits: 0})}</div>
                </div>
                <div class="stat-card red-top">
                    <div class="stat-card-label">Days Left</div>
                    <div class="stat-card-value white-text">${daysLeft}</div>
                </div>
            `;
        }

        function saveLimits() {
            data.limits.monthly = parseFloat(document.getElementById('monthly-limit').value) || 0;
            data.limits.weekly = parseFloat(document.getElementById('weekly-limit').value) || 0;
            saveData();
            alert('Limits Saved');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
            
            const titles = { home: 'Overview', transactions: 'Ledger', insights: 'Breakdown', settings: 'Settings' };
            document.getElementById('page-title').textContent = titles[tab];
            
            if (tab === 'insights') {
                renderCategoryChart();
                renderMonthlyStats();
            }
        }

        // --- AI & PDF GENERATION LOGIC ---

        async function fetchAIInsights(income, expenses, categoryBreakdown) {
            const breakdownString = Object.entries(categoryBreakdown).map(([c, a]) => `${c}: ₹${a}`).join(', ');
            const prompt = `Act as an expert financial advisor. Here is my current month's data: Total Income: ₹${income}, Total Expenses: ₹${expenses}. Expense Breakdown: ${breakdownString}. Provide a brief, highly actionable 3-point financial advice based on this exact data. Be encouraging. Keep it strictly under 100 words total. Format as plain text with 1., 2., 3. bullet points. Do not use asterisks or any markdown formatting.`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are a concise financial advisor." }] }
            };

            const modelsToTry = [
                'gemini-2.5-flash-preview-09-2025', 
                'gemini-2.5-flash', 
                'gemini-1.5-flash'
            ];

            let lastErrorMsg = '';

            for (const model of modelsToTry) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.status === 404) {
                        console.warn(`Model ${model} not found. Trying next...`);
                        lastErrorMsg = `HTTP 404: Model ${model} unavailable.`;
                        continue; 
                    }
                    
                    if (!response.ok) {
                        const errorDetails = await response.text();
                        throw new Error(`HTTP ${response.status} - ${errorDetails}`);
                    }
                    
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No insights generated.";
                    
                } catch (error) {
                    console.error(`Attempt with ${model} failed:`, error);
                    lastErrorMsg = error.message;
                }
            }
            throw new Error(`AI Request Failed completely. Last error: ${lastErrorMsg}`);
        }

        function generateChartImage(categoryTotals) {
            return new Promise((resolve) => {
                const ctx = document.getElementById('pdf-chart').getContext('2d');
                const labels = Object.keys(categoryTotals);
                const dataVals = Object.values(categoryTotals);
                const bgColors = ['#FF6B6B', '#4ECDC4', '#FF9F1C', '#A78BFA', '#00D9A3', '#FFD166', '#EF476F', '#118AB2'];

                const chart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataVals,
                            backgroundColor: bgColors.slice(0, labels.length),
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        animation: false,
                        responsive: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { font: { size: 14, family: 'sans-serif' } }
                            }
                        }
                    }
                });

                const base64Image = chart.toBase64Image();
                chart.destroy(); 
                resolve(base64Image);
            });
        }

        async function generatePDF() {
            const btn = document.getElementById('generate-btn');
            const spinner = document.getElementById('gen-spinner');
            const btnText = document.getElementById('gen-text');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Generating...';

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
                const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                
                const categoryTotals = {};
                thisMonth.filter(t => t.type === 'expense').forEach(t => {
                    categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
                });

                const aiSuggestions = await fetchAIInsights(income, expenses, categoryTotals);

                let chartImage = null;
                if (Object.keys(categoryTotals).length > 0) {
                    chartImage = await generateChartImage(categoryTotals);
                }

                doc.setFont("helvetica", "bold");
                doc.setFontSize(24);
                doc.setTextColor(40, 40, 40);
                doc.text('NOVA Finance Report', 20, 25);
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.setTextColor(100, 100, 100);
                doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 20, 32);

                doc.setDrawColor(200, 200, 200);
                doc.line(20, 38, 190, 38);
                
                doc.setFont("helvetica", "bold");
                doc.setTextColor(0, 200, 150);
                doc.text(`Total Income: Rs ${income.toLocaleString('en-IN')}`, 20, 50);
                
                doc.setTextColor(255, 100, 100);
                doc.text(`Total Expenses: Rs ${expenses.toLocaleString('en-IN')}`, 20, 58);
                
                doc.setTextColor(40, 40, 40);
                const balance = income - expenses;
                doc.text(`Net Balance: Rs ${balance.toLocaleString('en-IN')}`, 20, 66);

                doc.setFontSize(16);
                doc.text('Expense Breakdown', 20, 85);
                
                if (chartImage) {
                    doc.addImage(chartImage, 'PNG', 20, 95, 160, 80);
                } else {
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "italic");
                    doc.text("No expenses recorded this month.", 20, 105);
                }

                doc.setFontSize(16);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(40, 40, 40);
                doc.text('AI Expert Insights', 20, 190);
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                const splitSuggestions = doc.splitTextToSize(aiSuggestions, 170);
                doc.text(splitSuggestions, 20, 200);
                
                doc.save(`nova-report-${new Date().toISOString().split('T')[0]}.pdf`);

            } catch (error) {
                console.error(error);
                alert(`Report Generation Error:\n\n${error.message}`);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Generate Smart Report';
            }
        }

        loadData();
    </script>
</body>
