<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Finance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0D0D0D;
            --bg-darker: #000000;
            --surface: #1A1A1A;
            --surface-elevated: #242424;
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --text-dimmer: #6B6B6B;
            --accent: #FF6B6B;
            --accent-blue: #4ECDC4;
            --accent-purple: #A78BFA;
            --accent-orange: #FF9F1C;
            --success: #00D9A3;
            --danger: #FF6B6B;
            --border: #2A2A2A;
        }

        body {
            font-family: 'Work Sans', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            padding: 24px 20px;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-top: 20px;
            line-height: 1;
        }

        .balance-section {
            padding: 32px 20px 40px;
            background: var(--bg-darker);
            position: relative;
            overflow: hidden;
        }

        .balance-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(78,205,196,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .balance-card {
            background: linear-gradient(135deg, #1A1A1A 0%, #2A2A2A 100%);
            border-radius: 24px;
            padding: 36px 28px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .balance-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF6B6B 0%, #4ECDC4 50%, #A78BFA 100%);
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-dimmer);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .balance-amount {
            font-family: 'Syne', sans-serif;
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .stat-item {
            position: relative;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-blue);
        }

        .stat-item.expense::before {
            background: var(--danger);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dimmer);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-left: 12px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            padding-left: 12px;
        }

        .container {
            padding: 0 20px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 32px 0;
        }

        .action-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,107,107,0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.income::before {
            background: linear-gradient(135deg, transparent 0%, rgba(78,205,196,0.1) 100%);
        }

        .action-icon {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF9F1C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .action-btn.income .action-icon {
            background: linear-gradient(135deg, #4ECDC4 0%, #00D9A3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .action-label {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .section-link {
            font-size: 13px;
            color: var(--accent-blue);
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .transaction-item {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            transition: background 0.2s ease;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-item:active {
            background: var(--surface-elevated);
        }

        .transaction-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-right: 16px;
            background: linear-gradient(135deg, rgba(255,107,107,0.15) 0%, rgba(255,107,107,0.05) 100%);
            color: var(--danger);
        }

        .transaction-icon.income {
            background: linear-gradient(135deg, rgba(78,205,196,0.15) 0%, rgba(78,205,196,0.05) 100%);
            color: var(--accent-blue);
        }

        .transaction-content {
            flex: 1;
            min-width: 0;
        }

        .transaction-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text);
        }

        .transaction-meta {
            font-size: 12px;
            color: var(--text-dimmer);
        }

        .transaction-amount {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-right: 12px;
            letter-spacing: -0.5px;
        }

        .transaction-amount.expense {
            color: var(--danger);
        }

        .transaction-amount.income {
            color: var(--accent-blue);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface-elevated);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #FF6B6B 0%, #4ECDC4 100%);
        }

        .stat-card-label {
            font-size: 11px;
            color: var(--text-dimmer);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-card-value {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .chart-item {
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .chart-label {
            font-weight: 600;
            font-size: 14px;
        }

        .chart-value {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .chart-track {
            height: 10px;
            background: var(--surface-elevated);
            border-radius: 5px;
            overflow: hidden;
        }

        .chart-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B 0%, #4ECDC4 100%);
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-darker);
            border-top: 1px solid var(--border);
            padding: 16px 0 calc(16px + env(safe-area-inset-bottom));
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dimmer);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-btn.active {
            color: var(--text);
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #FF6B6B 0%, #4ECDC4 100%);
            border-radius: 3px 3px 0 0;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: flex-end;
            backdrop-filter: blur(10px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 28px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--surface-elevated);
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .close-btn:active {
            transform: scale(0.9);
        }

        .modal-body {
            padding: 28px 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 16px 18px;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 16px;
            font-family: 'Work Sans', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--surface);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-pill {
            padding: 12px 20px;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-pill:hover {
            border-color: var(--text-dimmer);
        }

        .category-pill.selected {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF9F1C 100%);
            border-color: transparent;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF9F1C 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--surface-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .checkbox-wrapper {
            background: var(--surface-elevated);
            padding: 16px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-wrapper input {
            width: auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-dimmer);
        }

        .warning-alert {
            background: rgba(255,159,28,0.1);
            border-left: 3px solid var(--accent-orange);
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div class="logo">FINANCE</div>
        </div>
        <h1 class="page-title" id="page-title">Overview</h1>
    </div>

    <div class="balance-section">
        <div class="balance-card">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount">₹<span id="available-balance">0</span></div>
            <div class="balance-stats">
                <div class="stat-item">
                    <div class="stat-label">Income</div>
                    <div class="stat-value">+₹<span id="total-income">0</span></div>
                </div>
                <div class="stat-item expense">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value">−₹<span id="total-expenses">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tab-content active" id="tab-home">
            <div class="action-grid">
                <div class="action-btn" onclick="openModal('expense')">
                    <div class="action-icon">−</div>
                    <div class="action-label">Add Expense</div>
                </div>
                <div class="action-btn income" onclick="openModal('income')">
                    <div class="action-icon">+</div>
                    <div class="action-label">Add Income</div>
                </div>
            </div>

            <div id="warning-container"></div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Recent</h2>
                    <button class="section-link" onclick="switchTab('transactions')">View All</button>
                </div>
                <div class="card">
                    <div id="recent-transactions"></div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-transactions">
            <div class="section" style="margin-top: 32px;">
                <div class="section-header">
                    <h2 class="section-title">Transactions</h2>
                </div>
                <div class="card">
                    <div id="all-transactions"></div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-insights">
            <div class="section" style="margin-top: 32px;">
                <div class="section-header">
                    <h2 class="section-title">Breakdown</h2>
                </div>
                <div class="card" style="padding: 24px;" id="category-chart"></div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Stats</h2>
                </div>
                <div class="stat-grid" id="monthly-stats"></div>
            </div>
        </div>

        <div class="tab-content" id="tab-settings">
            <div class="section" style="margin-top: 32px;">
                <div class="section-header">
                    <h2 class="section-title">Limits</h2>
                </div>
                <div class="card" style="padding: 24px;">
                    <div class="input-group">
                        <label class="input-label">Monthly Limit</label>
                        <input type="number" id="monthly-limit" placeholder="0" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Weekly Limit</label>
                        <input type="number" id="weekly-limit" placeholder="0" inputmode="decimal">
                    </div>
                    <button class="btn btn-primary" onclick="saveLimits()">Save</button>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Export</h2>
                </div>
                <div class="card" style="padding: 24px;">
                    <button class="btn btn-primary" onclick="generatePDF()">Generate Report</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Add Expense</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">SMS Extract</label>
                    <textarea id="sms-text" placeholder="Paste SMS here"></textarea>
                    <button class="btn btn-secondary" onclick="parseSMS()" style="margin-top: 12px;">Parse</button>
                </div>

                <div class="input-group">
                    <label class="input-label">Amount</label>
                    <input type="number" id="amount" placeholder="₹0" inputmode="decimal">
                </div>

                <div class="input-group">
                    <label class="input-label">Category</label>
                    <div class="category-pills" id="category-pills"></div>
                </div>

                <div class="input-group">
                    <label class="input-label">Description</label>
                    <input type="text" id="description" placeholder="What was this for?">
                </div>

                <div class="input-group">
                    <label class="input-label">Date</label>
                    <input type="date" id="transaction-date">
                </div>

                <div class="input-group" id="recurring-section">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="is-recurring">
                        <label for="is-recurring" style="font-size: 14px; font-weight: 500;">Recurring monthly</label>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="addTransaction()" id="submit-btn">Add</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-container">
            <button class="nav-btn active" onclick="switchTab('home')">
                <span class="nav-icon">●</span>
                <span class="nav-label">HOME</span>
            </button>
            <button class="nav-btn" onclick="switchTab('transactions')">
                <span class="nav-icon">▦</span>
                <span class="nav-label">HISTORY</span>
            </button>
            <button class="nav-btn" onclick="switchTab('insights')">
                <span class="nav-icon">◐</span>
                <span class="nav-label">INSIGHTS</span>
            </button>
            <button class="nav-btn" onclick="switchTab('settings')">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">SETTINGS</span>
            </button>
        </div>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        const EXPENSE_CATEGORIES = ['Food & Dining', 'Transport', 'Shopping', 'Bills', 'Entertainment', 'Healthcare', 'Groceries', 'Personal', 'Education', 'Responsibilities', 'Rent/EMI', 'Other'];
        const INCOME_CATEGORIES = ['Salary', 'Freelance', 'Gift', 'Investment', 'Bonus', 'Refund', 'Other'];

        let data = { transactions: [], limits: { monthly: 0, weekly: 0 } };
        let currentModalType = 'expense';
        let selectedCategory = '';
        let editingTransactionId = null;

        function loadData() {
            const saved = localStorage.getItem('expenseTrackerData');
            if (saved) {
                const loaded = JSON.parse(saved);
                if (loaded.expenses && !loaded.transactions) {
                    data.transactions = loaded.expenses.map(e => ({...e, type: 'expense', isRecurring: false}));
                    data.limits = loaded.limits || { monthly: 0, weekly: 0 };
                } else {
                    data = loaded;
                }
            }
            data.transactions = data.transactions.map(t => ({...t, isRecurring: t.isRecurring || false, type: t.type || 'expense'}));
            updateUI();
        }

        function saveData() {
            localStorage.setItem('expenseTrackerData', JSON.stringify(data));
        }

        function updateUI() {
            updateBalances();
            renderRecentTransactions();
            renderAllTransactions();
            renderCategoryChart();
            renderMonthlyStats();
            checkLimits();
            document.getElementById('monthly-limit').value = data.limits.monthly || '';
            document.getElementById('weekly-limit').value = data.limits.weekly || '';
        }

        function updateBalances() {
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expenses;

            document.getElementById('available-balance').textContent = balance.toLocaleString('en-IN');
            document.getElementById('total-income').textContent = income.toLocaleString('en-IN');
            document.getElementById('total-expenses').textContent = expenses.toLocaleString('en-IN');
        }

        function isThisMonth(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
        }

        function openModal(type, transactionId = null) {
            currentModalType = type;
            selectedCategory = '';
            editingTransactionId = transactionId;
            
            if (transactionId) {
                const transaction = data.transactions.find(t => t.id === transactionId);
                if (transaction) {
                    document.getElementById('modal-title').textContent = 'Edit';
                    document.getElementById('submit-btn').textContent = 'Update';
                    document.getElementById('amount').value = transaction.amount;
                    document.getElementById('description').value = transaction.description;
                    document.getElementById('transaction-date').value = new Date(transaction.date).toISOString().split('T')[0];
                    document.getElementById('is-recurring').checked = transaction.isRecurring || false;
                    selectedCategory = transaction.category;
                }
            } else {
                document.getElementById('modal-title').textContent = type === 'expense' ? 'Add Expense' : 'Add Income';
                document.getElementById('submit-btn').textContent = 'Add';
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                document.getElementById('sms-text').value = '';
                document.getElementById('transaction-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('is-recurring').checked = false;
            }
            
            document.getElementById('recurring-section').style.display = type === 'expense' ? 'block' : 'none';
            renderCategoryPills();
            document.getElementById('transaction-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('transaction-modal').classList.remove('show');
            editingTransactionId = null;
        }

        function renderCategoryPills() {
            const categories = currentModalType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
            document.getElementById('category-pills').innerHTML = categories.map(cat => 
                `<span class="category-pill ${cat === selectedCategory ? 'selected' : ''}" onclick="selectCategory('${cat}')">${cat}</span>`
            ).join('');
        }

        function selectCategory(category) {
            selectedCategory = category;
            renderCategoryPills();
        }

        function parseSMS() {
            const sms = document.getElementById('sms-text').value;
            const match = sms.match(/(?:Rs\.?|INR|₹)\s*(\d+(?:,\d+)*(?:\.\d{2})?)/i);
            if (match) {
                document.getElementById('amount').value = match[1].replace(/,/g, '');
                alert('✓ Extracted');
            } else {
                alert('Could not extract');
            }
        }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value || (currentModalType === 'expense' ? 'Expense' : 'Income');
            const dateInput = document.getElementById('transaction-date').value;
            const isRecurring = currentModalType === 'expense' ? document.getElementById('is-recurring').checked : false;
            
            if (!amount || amount <= 0) {
                alert('Enter valid amount');
                return;
            }
            
            if (!selectedCategory) {
                alert('Select category');
                return;
            }

            if (editingTransactionId) {
                const index = data.transactions.findIndex(t => t.id === editingTransactionId);
                if (index !== -1) {
                    data.transactions[index] = {...data.transactions[index], amount, category: selectedCategory, description, date: dateInput ? new Date(dateInput).toISOString() : data.transactions[index].date, isRecurring};
                }
            } else {
                data.transactions.unshift({id: Date.now(), type: currentModalType, amount, category: selectedCategory, description, date: dateInput ? new Date(dateInput).toISOString() : new Date().toISOString(), isRecurring});
            }

            saveData();
            updateUI();
            closeModal();
        }

        function editTransaction(id) {
            const transaction = data.transactions.find(t => t.id === id);
            if (transaction) openModal(transaction.type, id);
        }

        function renderRecentTransactions() {
            const list = document.getElementById('recent-transactions');
            const recent = data.transactions.slice(0, 6);

            if (recent.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-text">No transactions</div></div>';
                return;
            }

            list.innerHTML = recent.map(t => {
                const date = new Date(t.date);
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${t.type}">${t.type === 'expense' ? '−' : '+'}</div>
                        <div class="transaction-content">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${t.category} · ${date.toLocaleDateString()}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">${t.type === 'expense' ? '−' : '+'}₹${t.amount.toLocaleString('en-IN')}</div>
                        <button class="icon-btn" onclick="editTransaction(${t.id})" style="margin-left: 8px;">✎</button>
                        <button class="icon-btn" onclick="deleteTransaction(${t.id})">×</button>
                    </div>
                `;
            }).join('');
        }

        function renderAllTransactions() {
            const list = document.getElementById('all-transactions');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));

            if (thisMonth.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-text">No transactions</div></div>';
                return;
            }

            list.innerHTML = thisMonth.map(t => {
                const date = new Date(t.date);
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${t.type}">${t.type === 'expense' ? '−' : '+'}</div>
                        <div class="transaction-content">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${t.category} · ${date.toLocaleDateString()}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">${t.type === 'expense' ? '−' : '+'}₹${t.amount.toLocaleString('en-IN')}</div>
                        <button class="icon-btn" onclick="editTransaction(${t.id})" style="margin-left: 8px;">✎</button>
                        <button class="icon-btn" onclick="deleteTransaction(${t.id})">×</button>
                    </div>
                `;
            }).join('');
        }

        function deleteTransaction(id) {
            if (!confirm('Delete?')) return;
            data.transactions = data.transactions.filter(t => t.id !== id);
            saveData();
            updateUI();
        }

        function renderCategoryChart() {
            const container = document.getElementById('category-chart');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date) && t.type === 'expense');
            const categoryTotals = {};
            thisMonth.forEach(t => categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount);
            const total = Object.values(categoryTotals).reduce((sum, val) => sum + val, 0);
            
            if (total === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-text">No data</div></div>';
                return;
            }

            container.innerHTML = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]).map(([category, amount]) => {
                const percent = (amount / total * 100).toFixed(1);
                return `
                    <div class="chart-item">
                        <div class="chart-header">
                            <span class="chart-label">${category}</span>
                            <span class="chart-value">₹${amount.toLocaleString('en-IN')} · ${percent}%</span>
                        </div>
                        <div class="chart-track">
                            <div class="chart-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMonthlyStats() {
            const container = document.getElementById('monthly-stats');
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
            const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const avgDaily = expenses / new Date().getDate();
            const daysLeft = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate();

            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-card-label">Income</div>
                    <div class="stat-card-value" style="color: var(--accent-blue);">₹${income.toLocaleString('en-IN')}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Expenses</div>
                    <div class="stat-card-value" style="color: var(--danger);">₹${expenses.toLocaleString('en-IN')}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Daily Avg</div>
                    <div class="stat-card-value">₹${avgDaily.toLocaleString('en-IN', {maximumFractionDigits: 0})}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Days Left</div>
                    <div class="stat-card-value">${daysLeft}</div>
                </div>
            `;
        }

        function saveLimits() {
            data.limits.monthly = parseFloat(document.getElementById('monthly-limit').value) || 0;
            data.limits.weekly = parseFloat(document.getElementById('weekly-limit').value) || 0;
            saveData();
            checkLimits();
            alert('Saved');
        }

        function checkLimits() {
            const thisMonth = data.transactions.filter(t => isThisMonth(t.date) && t.type === 'expense');
            const monthlySpent = thisMonth.reduce((sum, t) => sum + t.amount, 0);
            const warnings = [];
            
            if (data.limits.monthly > 0 && monthlySpent >= data.limits.monthly * 0.8) {
                const percent = ((monthlySpent / data.limits.monthly) * 100).toFixed(0);
                warnings.push(`${percent}% of monthly limit used (₹${monthlySpent.toLocaleString('en-IN')} / ₹${data.limits.monthly.toLocaleString('en-IN')})`);
            }
            
            document.getElementById('warning-container').innerHTML = warnings.map(w => `<div class="warning-alert">${w}</div>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
            const titles = { home: 'Overview', transactions: 'Transactions', insights: 'Insights', settings: 'Settings' };
            document.getElementById('page-title').textContent = titles[tab];
            if (tab === 'insights') {
                renderCategoryChart();
                renderMonthlyStats();
            }
        }

        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const thisMonth = data.transactions.filter(t => isThisMonth(t.date));
                const income = thisMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const expenses = thisMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                
                doc.setFontSize(20);
                doc.text('Report', 20, 20);
                doc.setFontSize(12);
                doc.text(`Income: Rs ${income.toLocaleString('en-IN')}`, 20, 35);
                doc.text(`Expenses: Rs ${expenses.toLocaleString('en-IN')}`, 20, 42);
                doc.text(`Balance: Rs ${(income - expenses).toLocaleString('en-IN')}`, 20, 49);
                
                doc.save(`report-${new Date().toISOString().split('T')[0]}.pdf`);
                alert('Generated');
            } catch (error) {
                alert('Error');
            }
        }

        loadData();
    </script>
</body>
</html>
